# Minimal: mouse support + scroll-wheel translates to PageUp/PageDown
# (instead of Terminal.app's default of arrow-up/arrow-down in alt-screen).
# Everything else stays at tmux defaults. Re-add other customisations
# one at a time only if they don't reintroduce the copy/paste issue.

set -g mouse on

# Prefix: C-a (double-tap to send literal C-a through)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Toggle mouse on/off (off = terminal handles selection for native copy/paste)
bind m set -g mouse \; display "Mouse: #{?mouse,on,off}"

bind-key -T root WheelUpPane \
    if-shell -F -t = "#{?pane_in_mode,1,#{mouse_any_flag}}" \
        "send-keys -M" \
        "if-shell -F -t = '#{alternate_on}' 'send-keys -t = PageUp' 'copy-mode -e'"
bind-key -T root WheelDownPane \
    if-shell -F -t = "#{?pane_in_mode,1,#{mouse_any_flag}}" \
        "send-keys -M" \
        "if-shell -F -t = '#{alternate_on}' 'send-keys -t = PageDown' ''"
