# ~/.tmux.conf
# ----------------------------------------------------------------------
# Ported and slimmed from the previous setup. Mosh-friendly: no aggressive
# status refresh, generous scrollback (long-lived sessions roam well).

# ---- prefix --------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # double-tap forwards C-a to the running app

# ---- general -------------------------------------------------------
set -sg escape-time 1         # lower the escape-key delay
set -g  mouse on
set -g  base-index 1
setw -g pane-base-index 1
set -g  history-limit 50000   # plenty for mosh-pinned sessions
setw -g mode-keys vi

# ---- reload config -------------------------------------------------
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ---- splits --------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ---- pane navigation (vim-style) -----------------------------------
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ---- pane resize (shifted) -----------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- colours / status ---------------------------------------------
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
setw -g window-status-current-style bright
set -g  status-bg black
set -g  status-fg white
set -g  status-left-length 40
set -g  status-left  "#[fg=green]\"#S\""
set -g  status-right "#[fg=green]#h | %d %b %R"
set -g  status-justify centre
setw -g monitor-activity on
set -g  visual-activity on

# ---- copy-mode: send selection to system clipboard ----------------
# Uses OSC 52: tmux emits an escape sequence carrying the selection,
# and the outer terminal emulator (iTerm2, Terminal.app, kitty, etc.)
# decodes it and writes to the local clipboard. Works whether tmux is
# running locally OR on a remote host via ssh/mosh -- it's just
# terminal output that passes through transparently.
#
# Terminal-side prerequisite (one-time, per terminal app):
#   iTerm2:        Preferences -> General -> Selection ->
#                  "Applications in terminal may access clipboard"
#   Terminal.app:  defaults write com.apple.Terminal AllowClipboardAccess -bool true
#   kitty/foot/wezterm/Alacritty: on by default
set -s set-clipboard on
set -ag terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

# Mouse drag-end copies and emits OSC 52 (no external command argument
# means "use the internal mechanism", which honours set-clipboard).
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
# y in copy-mode-vi does the same thing as the manual analogue.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# ---- "zoom" a pane by swapping it into a temp window --------------
unbind Up
bind Up   new-window -d -n tmp \; swap-pane -s tmp.1 \; select-window -t tmp
unbind Down
bind Down last-window \; swap-pane -s tmp.1 \; kill-window -t tmp
