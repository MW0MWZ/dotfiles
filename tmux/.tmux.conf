# ~/.tmux.conf
# ----------------------------------------------------------------------
# Ported and slimmed from the previous setup. Mosh-friendly: no aggressive
# status refresh, generous scrollback (long-lived sessions roam well).

# ---- prefix --------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # double-tap forwards C-a to the running app

# ---- general -------------------------------------------------------
set -sg escape-time 1         # lower the escape-key delay
# Mouse ON specifically so we can intercept scroll-wheel events at the
# tmux level. Without this, macOS Terminal.app translates wheel up/down
# into arrow-up/down keypresses (its "smart scroll" for alternate-screen
# apps), which is rarely what you want.
#
# Trade-off: with mouse on, tmux also captures click events. macOS
# Terminal.app's text-selection behaviour during a click-drag may stop
# working as it did before; use Option-drag (or your profile's
# "bypass mouse mode" modifier) to select text the old way.
set -g  mouse on

# Scroll-wheel bindings: in alternate-screen apps (less, man, vim, top,
# etc.) send PageUp/PageDown to the app; in a plain shell, enter
# copy-mode and scroll the tmux scrollback. Pass through to anything
# that handles mouse itself (vim with mouse on, etc.).
bind-key -T root WheelUpPane \
    if-shell -F -t = "#{?pane_in_mode,1,#{mouse_any_flag}}" \
        "send-keys -M" \
        "if-shell -F -t = '#{alternate_on}' 'send-keys -t = PageUp' 'copy-mode -e'"
bind-key -T root WheelDownPane \
    if-shell -F -t = "#{?pane_in_mode,1,#{mouse_any_flag}}" \
        "send-keys -M" \
        "if-shell -F -t = '#{alternate_on}' 'send-keys -t = PageDown' ''"

set -g  base-index 1
setw -g pane-base-index 1
set -g  history-limit 50000   # plenty for mosh-pinned sessions
setw -g mode-keys vi

# ---- reload config -------------------------------------------------
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ---- splits --------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ---- pane navigation (vim-style) -----------------------------------
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ---- pane resize (shifted) -----------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- colours / status ---------------------------------------------
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
setw -g window-status-current-style bright
set -g  status-bg black
set -g  status-fg white
set -g  status-left-length 40
set -g  status-left  "#[fg=green]\"#S\""
set -g  status-right "#[fg=green]#h | %d %b %R"
set -g  status-justify centre
setw -g monitor-activity on
set -g  visual-activity on

# ---- copy-mode: send selection to system clipboard ----------------
# Uses OSC 52: tmux emits an escape sequence carrying the selection,
# and the outer terminal emulator (iTerm2, Terminal.app, kitty, etc.)
# decodes it and writes to the local clipboard.
#
# Terminal-side prerequisite (one-time, per terminal app):
#   iTerm2:        Preferences -> General -> Selection ->
#                  "Applications in terminal may access clipboard"
#   Terminal.app:  defaults write com.apple.Terminal AllowClipboardAccess -bool true
#   kitty/foot/wezterm/Alacritty: on by default
set -s set-clipboard on
# terminal-features (tmux 3.2+) is the modern way to say "this terminal
# supports the OSC 52 clipboard feature" -- it propagates the Ms
# capability without needing an explicit terminal-overrides entry that
# matches the right TERM name. The older terminal-overrides line below
# is kept as a belt-and-suspenders fallback for terminals that don't
# carry the feature through the features mechanism.
set -as terminal-features ',*:clipboard'
set -ag terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

# Mouse drag-end copies the selection (via OSC 52, honouring
# set-clipboard above) but KEEPS the selection visible -- so the user
# can see what was just copied. Press q / Escape / click elsewhere to
# clear the highlight. -no-clear means "don't exit copy-mode after the
# copy"; the alternative (-and-cancel) exits immediately and the
# selection visually disappears.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
# `y` is the explicit vim-style "yank and exit copy-mode" -- you pressed
# a key on purpose, so we honour the cancel.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# ---- "zoom" a pane by swapping it into a temp window --------------
unbind Up
bind Up   new-window -d -n tmp \; swap-pane -s tmp.1 \; select-window -t tmp
unbind Down
bind Down last-window \; swap-pane -s tmp.1 \; kill-window -t tmp
